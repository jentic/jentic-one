components:
  schemas:
    APIReference:
      description: |-
        Identifies a target API — the strict (all-required) variant.

        Used in responses and as the canonical identity tuple.
      properties:
        name:
          title: Name
          type: string
        vendor:
          title: Vendor
          type: string
        version:
          title: Version
          type: string
      required:
      - vendor
      - name
      - version
      title: APIReference
      type: object
    APIReferenceRequest:
      description: Relaxed variant for request bodies where partial identification is allowed.
      properties:
        name:
          default: ''
          title: Name
          type: string
        vendor:
          title: Vendor
          type: string
        version:
          default: ''
          title: Version
          type: string
      required:
      - vendor
      title: APIReferenceRequest
      type: object
    AccessRequestFileRequest:
      description: Request body for filing an access request.
      properties:
        items:
          items:
            $ref: '#/components/schemas/AccessRequestItemRequest'
          minItems: 1
          title: Items
          type: array
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
      required:
      - items
      title: AccessRequestFileRequest
      type: object
    AccessRequestItemRequest:
      description: |-
        A single line-item in a file request.

        **Permission rules:** Rules control which upstream API operations the broker
        allows through a credential binding. They are enforced per (toolkit_id,
        credential_id) pair, so they can only be attached to credential:bind items —
        not toolkit:bind or scope:grant. You do not need toolkits:write scope to set
        rules; include them directly on the credential:bind item when filing the
        access request, and the approver's decision persists them on the binding.
      properties:
        action:
          enum:
          - bind
          - grant
          title: Action
          type: string
        resource_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Explicit ID of the resource (e.g. a toolkit tk_… or credential cred_… ID). For toolkit:bind, you can omit this and use resource_reference instead.
          title: Resource Id
        resource_reference:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Look up the resource by API identity instead of by ID. For toolkit:bind, provide {vendor, name, version} to resolve the toolkit that serves the given API. Use this when you don't know the toolkit ID.
          title: Resource Reference
        resource_type:
          enum:
          - credential
          - toolkit
          - scope
          title: Resource Type
          type: string
        rules:
          anyOf:
          - items:
              $ref: '#/components/schemas/jentic_one__control__web__schemas__access_requests__PermissionRuleSchema'
            type: array
          - type: 'null'
          description: 'Permission rules for the binding (credential:bind only). Rules are evaluated first-match-wins by the broker; if no rule matches, the request is denied. Example: [{"effect": "allow", "path": ".*"}].'
          title: Rules
        to_id:
          anyOf:
          - type: string
          - type: 'null'
          title: To Id
        to_type:
          anyOf:
          - type: string
          - type: 'null'
          title: To Type
      required:
      - resource_type
      - action
      title: AccessRequestItemRequest
      type: object
    AccessRequestItemResponse:
      description: Response model for a single access-request line item.
      properties:
        action:
          title: Action
          type: string
        applied_effects:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Applied Effects
        credential_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Credential Name
        decided_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Decided At
        decided_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Decided By
        decision_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Decision Reason
        id:
          title: Id
          type: string
        resource_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Resource Id
        resource_reference:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Resource Reference
        resource_type:
          title: Resource Type
          type: string
        rules:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Rules
        status:
          title: Status
          type: string
        to_id:
          anyOf:
          - type: string
          - type: 'null'
          title: To Id
        to_type:
          anyOf:
          - type: string
          - type: 'null'
          title: To Type
        toolkit_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Toolkit Name
      required:
      - id
      - resource_type
      - action
      - status
      title: AccessRequestItemResponse
      type: object
    AccessRequestListResponse:
      description: Paginated list of access requests.
      properties:
        data:
          items:
            $ref: '#/components/schemas/AccessRequestResponse'
          title: Data
          type: array
        has_more:
          title: Has More
          type: boolean
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - data
      - has_more
      title: AccessRequestListResponse
      type: object
    AccessRequestResponse:
      description: Response model for an access request envelope.
      properties:
        actor_id:
          title: Actor Id
          type: string
        approve_url:
          title: Approve Url
          type: string
        created_by:
          title: Created By
          type: string
        evaluation:
          anyOf:
          - $ref: '#/components/schemas/EvaluationResponse'
          - type: 'null'
        expires_at:
          format: date-time
          title: Expires At
          type: string
        filed_at:
          format: date-time
          title: Filed At
          type: string
        filer_owner_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Filer Owner Id
        id:
          title: Id
          type: string
        items:
          items:
            $ref: '#/components/schemas/AccessRequestItemResponse'
          title: Items
          type: array
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
        requested_by:
          title: Requested By
          type: string
        status:
          title: Status
          type: string
      required:
      - id
      - actor_id
      - requested_by
      - status
      - approve_url
      - filed_at
      - expires_at
      - created_by
      - items
      title: AccessRequestResponse
      type: object
    ActorListResponse:
      description: Paginated list of actors.
      properties:
        data:
          items:
            $ref: '#/components/schemas/ActorSummaryResponse'
          title: Data
          type: array
        has_more:
          title: Has More
          type: boolean
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - data
      - has_more
      title: ActorListResponse
      type: object
    ActorSummaryResponse:
      description: Single actor entry in the actors list.
      properties:
        active:
          title: Active
          type: boolean
        actor_type:
          $ref: '#/components/schemas/ActorType'
        created_at:
          format: date-time
          title: Created At
          type: string
        id:
          title: Id
          type: string
        name:
          title: Name
          type: string
      required:
      - id
      - actor_type
      - name
      - active
      - created_at
      title: ActorSummaryResponse
      type: object
    ActorType:
      description: Type of authenticated actor.
      enum:
      - user
      - agent
      - service_account
      - toolkit
      title: ActorType
      type: string
    AgentCreateRequest:
      description: Request body for creating an agent manually.
      properties:
        description:
          anyOf:
          - maxLength: 1024
            type: string
          - type: 'null'
          title: Description
        name:
          maxLength: 255
          minLength: 1
          title: Name
          type: string
        scopes:
          anyOf:
          - items:
              maxLength: 64
              minLength: 1
              pattern: ^[a-zA-Z0-9_:./-]+$
              type: string
            maxItems: 100
            type: array
          - type: 'null'
          title: Scopes
      required:
      - name
      title: AgentCreateRequest
      type: object
    AgentListResponse:
      description: List of agents.
      properties:
        data:
          items:
            $ref: '#/components/schemas/AgentResponse'
          title: Data
          type: array
        has_more:
          title: Has More
          type: boolean
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - data
      - has_more
      title: AgentListResponse
      type: object
    AgentPatchRequest:
      description: Request body for partially updating an agent.
      properties:
        description:
          anyOf:
          - maxLength: 1024
            type: string
          - type: 'null'
          title: Description
        name:
          anyOf:
          - maxLength: 255
            minLength: 1
            type: string
          - type: 'null'
          title: Name
        owner_id:
          anyOf:
          - maxLength: 255
            minLength: 1
            type: string
          - type: 'null'
          title: Owner Id
      title: AgentPatchRequest
      type: object
    AgentResponse:
      description: Agent representation in API responses.
      properties:
        approved_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Approved At
        approved_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Approved By
        created_at:
          format: date-time
          title: Created At
          type: string
        denial_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Denial Reason
        denied_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Denied By
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        has_api_key:
          default: false
          title: Has Api Key
          type: boolean
        id:
          title: Id
          type: string
        name:
          title: Name
          type: string
        owner_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Id
        parent_agent_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Agent Id
        registered_by:
          title: Registered By
          type: string
        status:
          title: Status
          type: string
      required:
      - id
      - name
      - registered_by
      - status
      - created_at
      title: AgentResponse
      type: object
    AgentScopesRequest:
      description: Request body for replacing an agent's scopes.
      properties:
        scopes:
          items:
            maxLength: 64
            minLength: 1
            pattern: ^[a-zA-Z0-9_:./-]+$
            type: string
          maxItems: 100
          title: Scopes
          type: array
      required:
      - scopes
      title: AgentScopesRequest
      type: object
    AgentScopesResponse:
      description: Response containing an agent's current scopes.
      properties:
        scopes:
          items:
            type: string
          title: Scopes
          type: array
      required:
      - scopes
      title: AgentScopesResponse
      type: object
    AmendItemSchema:
      description: A single item amendment.
      properties:
        item_id:
          title: Item Id
          type: string
        resource_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Resource Id
        rules:
          anyOf:
          - items:
              $ref: '#/components/schemas/jentic_one__control__web__schemas__access_requests__PermissionRuleSchema'
            type: array
          - type: 'null'
          title: Rules
      required:
      - item_id
      title: AmendItemSchema
      type: object
    AmendRequest:
      description: Request body for the :amend verb.
      properties:
        items:
          items:
            $ref: '#/components/schemas/AmendItemSchema'
          minItems: 1
          title: Items
          type: array
      required:
      - items
      title: AmendRequest
      type: object
    ApiImportLinksResponse:
      description: Hypermedia links for an import response.
      properties:
        self:
          title: Self
          type: string
      required:
      - self
      title: ApiImportLinksResponse
      type: object
    ApiImportRequest:
      description: Wrapper for a batch of import sources.
      properties:
        sources:
          items:
            discriminator:
              mapping:
                inline: '#/components/schemas/ApiSourceInline'
                url: '#/components/schemas/ApiSourceUrl'
              propertyName: type
            oneOf:
            - $ref: '#/components/schemas/ApiSourceUrl'
            - $ref: '#/components/schemas/ApiSourceInline'
          maxItems: 100
          minItems: 1
          title: Sources
          type: array
      required:
      - sources
      title: ApiImportRequest
      type: object
    ApiImportResponse:
      description: Acknowledgement payload for an asynchronous import job.
      properties:
        _links:
          $ref: '#/components/schemas/ApiImportLinksResponse'
        job_id:
          title: Job Id
          type: string
        status:
          title: Status
          type: string
      required:
      - job_id
      - status
      - _links
      title: ApiImportResponse
      type: object
    ApiInfoResponse:
      description: API identification information.
      properties:
        host:
          anyOf:
          - type: string
          - type: 'null'
          title: Host
        name:
          title: Name
          type: string
        vendor:
          title: Vendor
          type: string
        version:
          title: Version
          type: string
      required:
      - vendor
      - name
      - version
      title: ApiInfoResponse
      type: object
    ApiKeyCreateRequest:
      description: Create request for api_key credentials.
      examples:
      - api:
          name: stripe
          vendor: stripe.com
          version: '2024-04-10'
        field_name: Authorization
        key: sk_live_…
        location: header
        name: Stripe live key
        provider: static
        type: api_key
      properties:
        api:
          $ref: '#/components/schemas/APIReferenceRequest'
          description: Loose (vendor, name, version) API identity tuple.
        field_name:
          description: Header or query-parameter name carrying the key.
          title: Field Name
          type: string
        key:
          description: The API key secret. Stored encrypted; never returned after create.
          title: Key
          type: string
        location:
          $ref: '#/components/schemas/CredentialLocation'
          description: Where to inject the key on upstream calls.
        name:
          description: Human-readable label for the credential.
          title: Name
          type: string
        provider:
          default: static
          description: Credential provider; 'static' for stored secrets.
          title: Provider
          type: string
        runtime_config:
          anyOf:
          - $ref: '#/components/schemas/RuntimeConfig'
          - type: 'null'
        server_variables:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Server Variables
        type:
          const: api_key
          title: Type
          type: string
      required:
      - type
      - name
      - api
      - key
      - location
      - field_name
      title: ApiKeyCreateRequest
      type: object
    ApiKeyHistoryEntryResponse:
      description: A single event in the API key audit trail.
      properties:
        action:
          title: Action
          type: string
        actor_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Actor Id
        id:
          title: Id
          type: string
        occurred_at:
          format: date-time
          title: Occurred At
          type: string
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
      required:
      - id
      - action
      - occurred_at
      title: ApiKeyHistoryEntryResponse
      type: object
    ApiKeyHistoryResponse:
      description: Audit trail of API key operations.
      properties:
        data:
          items:
            $ref: '#/components/schemas/ApiKeyHistoryEntryResponse'
          title: Data
          type: array
      required:
      - data
      title: ApiKeyHistoryResponse
      type: object
    ApiKeyInfoResponse:
      description: API key metadata — retrievable even after revocation.
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        created_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Created By
        id:
          title: Id
          type: string
        rotated_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Rotated At
        status:
          title: Status
          type: string
      required:
      - id
      - status
      - created_at
      title: ApiKeyInfoResponse
      type: object
    ApiKeyResponse:
      description: Response containing a plaintext API key (shown once).
      properties:
        key:
          title: Key
          type: string
      required:
      - key
      title: ApiKeyResponse
      type: object
    ApiKeyUpdateRequest:
      description: Update request for api_key credentials.
      properties:
        active:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Active
        field_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Field Name
        key:
          anyOf:
          - type: string
          - type: 'null'
          title: Key
        location:
          anyOf:
          - $ref: '#/components/schemas/CredentialLocation'
          - type: 'null'
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        runtime_config:
          anyOf:
          - $ref: '#/components/schemas/RuntimeConfig'
          - type: 'null'
        server_variables:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Server Variables
        type:
          const: api_key
          title: Type
          type: string
      required:
      - type
      title: ApiKeyUpdateRequest
      type: object
    ApiLinksResponse:
      description: Hypermedia links for a (local) API resource.
      properties:
        current_revision:
          anyOf:
          - type: string
          - type: 'null'
          title: Current Revision
        revisions:
          title: Revisions
          type: string
        self:
          title: Self
          type: string
      required:
      - self
      - revisions
      title: ApiLinksResponse
      type: object
    ApiListResponse:
      description: Cursor-paginated list of APIs.
      properties:
        data:
          items:
            $ref: '#/components/schemas/ApiResponse'
          title: Data
          type: array
        has_more:
          title: Has More
          type: boolean
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - data
      - has_more
      title: ApiListResponse
      type: object
    ApiReferenceResponse:
      description: Core API identifier triple plus derived host.
      properties:
        host:
          anyOf:
          - type: string
          - type: 'null'
          title: Host
        name:
          title: Name
          type: string
        vendor:
          title: Vendor
          type: string
        version:
          title: Version
          type: string
      required:
      - vendor
      - name
      - version
      - host
      title: ApiReferenceResponse
      type: object
    ApiResponse:
      description: |-
        Full API aggregate response.

        ``GET /apis`` is the local registry — every item is an API imported into
        this deployment. The public catalog of importable-but-not-yet-imported APIs
        is a separate surface (``GET /catalog``); the two are not blended.
      properties:
        _links:
          $ref: '#/components/schemas/ApiLinksResponse'
        api:
          $ref: '#/components/schemas/ApiReferenceResponse'
        created_at:
          format: date-time
          title: Created At
          type: string
        current_revision_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Current Revision Id
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        icon_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Icon Url
        operation_count:
          title: Operation Count
          type: integer
        revision_count:
          title: Revision Count
          type: integer
        security_schemes:
          items:
            type: string
          title: Security Schemes
          type: array
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - api
      - display_name
      - description
      - icon_url
      - current_revision_id
      - revision_count
      - operation_count
      - security_schemes
      - created_at
      - updated_at
      - _links
      title: ApiResponse
      type: object
    ApiSourceInline:
      description: Import source carrying raw OpenAPI/Arazzo content inline.
      properties:
        api_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Name
        content:
          title: Content
          type: string
        filename:
          title: Filename
          type: string
        submitted_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Submitted By
        type:
          const: inline
          title: Type
          type: string
        vendor:
          anyOf:
          - type: string
          - type: 'null'
          title: Vendor
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
      required:
      - type
      - content
      - filename
      title: ApiSourceInline
      type: object
    ApiSourceUrl:
      description: Import source pointing at a fetchable URL.
      properties:
        api_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Name
        submitted_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Submitted By
        type:
          const: url
          title: Type
          type: string
        url:
          format: uri
          maxLength: 2083
          minLength: 1
          title: Url
          type: string
        vendor:
          anyOf:
          - type: string
          - type: 'null'
          title: Vendor
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
      required:
      - type
      - url
      title: ApiSourceUrl
      type: object
    ApiUpdateRequest:
      additionalProperties: false
      description: Partial update payload for an API's presentation fields.
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        icon_url:
          anyOf:
          - format: uri
            maxLength: 2083
            minLength: 1
            type: string
          - type: 'null'
          title: Icon Url
      title: ApiUpdateRequest
      type: object
    AuditListResponse:
      description: Paginated list of audit entries.
      properties:
        data:
          items:
            $ref: '#/components/schemas/AuditResponse'
          title: Data
          type: array
        has_more:
          title: Has More
          type: boolean
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - data
      - has_more
      title: AuditListResponse
      type: object
    AuditResponse:
      description: Audit entry representation in API responses.
      properties:
        action:
          title: Action
          type: string
        actor_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Actor Id
        actor_session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Actor Session Id
        actor_type:
          title: Actor Type
          type: string
        after:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: After
        before:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Before
        diff:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Diff
        id:
          title: Id
          type: string
        ip_address:
          anyOf:
          - type: string
          - type: 'null'
          title: Ip Address
        job_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Job Id
        occurred_at:
          format: date-time
          title: Occurred At
          type: string
        origin:
          anyOf:
          - type: string
          - type: 'null'
          title: Origin
        reason:
          anyOf:
