    OperationPreviewListResponse:
      description: |-
        Capped, offset-paginated operation preview for a catalog entry.

        Unlike list endpoints (cursor-paginated), the preview uses simple
        offset/limit pagination deliberately: it reads a single, already-fetched spec
        document and is hard-capped at ``PREVIEW_MAX_OPERATIONS`` operations, so there
        is no large/mutating result set that would justify keyset cursors.
      examples:
      - data: []
        info:
          description: Payments.
          title: Stripe
          version: '2024-01-01'
        offset: 0
        security_schemes: {}
        total: 42
        truncated: true
      properties:
        data:
          description: The page of previewed operations.
          items:
            $ref: '#/components/schemas/PreviewOperationResponse'
          title: Data
          type: array
        info:
          $ref: '#/components/schemas/PreviewInfoResponse'
          description: The spec's `info` block.
        offset:
          description: Offset of the returned window.
          title: Offset
          type: integer
        security_schemes:
          additionalProperties:
            additionalProperties: true
            type: object
          description: Slimmed `components.securitySchemes` projection.
          title: Security Schemes
          type: object
        total:
          description: Total operations in the spec (pre-page).
          title: Total
          type: integer
        truncated:
          description: Whether more operations follow this window.
          title: Truncated
          type: boolean
      required:
      - data
      - total
      - offset
      - truncated
      - info
      - security_schemes
      title: OperationPreviewListResponse
      type: object
