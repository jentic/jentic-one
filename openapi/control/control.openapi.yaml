paths:
  /.well-known/jwks.json:
    get:
      description: Return the JWKS document with the active public signing keys (ES256).
      operationId: jwks
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Jwks
                type: object
          description: Successful Response
        '400':
          content:
            application/problem+json:
              example: &id001
                detail: The request was malformed or failed a precondition.
                instance: /example/path
                status: 400
                title: Bad Request
                type: bad_request
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Bad Request
        '422':
          content:
            application/problem+json:
              example: &id002
                detail: Request validation failed; see errors[] for details.
                errors:
                - detail: Field 'name' must not be blank.
                  pointer: '#/name'
                instance: /example/path
                status: 422
                title: Unprocessable Entity
                type: validation_error
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Unprocessable Entity
        '500':
          content:
            application/problem+json:
              example: &id003
                detail: An unexpected error occurred.
                instance: /example/path
                status: 500
                title: Internal Server Error
                type: server_error
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Internal Server Error
        '503':
          content:
            application/problem+json:
              example: &id004
                detail: The database is temporarily unavailable; please retry.
                instance: /example/path
                status: 503
                title: Service Unavailable
                type: database_unavailable
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Service Unavailable
      security: []
      summary: JSON Web Key Set
      tags:
      - Discovery
  /.well-known/oauth-authorization-server:
    get:
      description: Return RFC 8414 authorization-server metadata (endpoints, grant types, algorithms).
      operationId: oauthAuthorizationServer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Oauthauthorizationserver
                type: object
          description: Successful Response
        '400':
          content:
            application/problem+json:
              example: *id001
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Bad Request
        '422':
          content:
            application/problem+json:
              example: *id002
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Unprocessable Entity
        '500':
          content:
            application/problem+json:
              example: *id003
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Internal Server Error
        '503':
          content:
            application/problem+json:
              example: *id004
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Service Unavailable
      security: []
      summary: OAuth authorization server metadata
      tags:
      - Discovery
  /access-requests:
    get:
      description: List access requests with cursor-based pagination.
      operationId: listAccessRequests
      parameters:
      - in: query
        name: actor_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Actor Id
      - in: query
        name: status
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - in: query
        name: cursor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRequestListResponse'
          description: Successful Response
        '400':
          content:
            application/problem+json:
              example: *id001
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Bad Request
        '401':
          content:
            application/problem+json:
              example: &id005
                detail: Authentication is required or the bearer token is invalid.
                instance: /example/path
                status: 401
                title: Unauthorized
                type: unauthorized
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Unauthorized
        '403':
          content:
            application/problem+json:
              example: &id006
                detail: The authenticated principal lacks the required permission.
                instance: /example/path
                status: 403
                title: Forbidden
                type: forbidden
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Forbidden
        '422':
          content:
            application/problem+json:
              example: *id002
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Unprocessable Entity
        '500':
          content:
            application/problem+json:
              example: *id003
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Internal Server Error
        '503':
          content:
            application/problem+json:
              example: *id004
