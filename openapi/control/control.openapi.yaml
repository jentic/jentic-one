servers:
- description: Same-origin (relative)
  url: /
tags:
- description: Part of the **Core / Access** bounded context — the authoritative record of "who can call what, with which secret". A `Credential` is the auth secret + header configuration the Broker injects on the way out to an upstream API. Credentials reference registry content via the loose `(vendor, name, version)` identity tuple (see `APIReference`) — there is no foreign key between Core and Registry, by design. Cleartext secret material is returned **exactly once** at creation (and on rotation via `PATCH`). Read paths return a redacted projection — last-N characters, hints, never the secret itself.
  name: Credentials
- description: |-
    Part of the **Core / Access** bounded context — a `Toolkit` is a scoped bundle of credentials and permissions issued to an agent or service. This tag covers **toolkit lifecycle**: list, create, read, update, delete. Sub-resources (keys, credential bindings, per-binding permission rules) live under the sibling tags `Toolkit Keys`, `Toolkit Credentials`, and `Toolkit Permissions`.

    Two distinct values are involved: the **toolkit ID** is `tk_…` (public; appears in URLs, logs, and `Jentic-Toolkit-Id` headers), and the **toolkit secret** is `jntc_live_…` (private; the plaintext API key shown exactly once at toolkit creation or when a new key is issued).
  name: Toolkits
- description: |-
    Sub-resource of **Toolkits** (Core / Access bounded context). A toolkit can hold many API keys at once — different agents, machines, or environments typically each get their own. Each key record (`ck_…`) carries a label, optional CIDR allowlist, and a revoked flag. The plaintext value (`jntc_live_…`) is shown exactly once at creation and never returned afterwards (only `key_preview` exposes the last few characters).

    Rotation is do-and-then-revoke: issue a fresh key, switch callers, then `DELETE` the old key. There is no in-place rotate operation — multi-key rotation is always do-and-then-revoke so live callers never see a window where every key is invalid.
  name: Toolkit Keys
- description: |-
    Sub-resource of **Toolkits** (Core / Access bounded context). A toolkit doesn't own credentials directly — it **binds** to credentials that already exist in `/credentials`. The binding is the link record that authorises the Broker to inject a specific credential on calls made under this toolkit. The same credential can be bound to many toolkits.

    Bindings can carry initial fine-grained permission rules inline via `ToolkitCredentialBindRequest.permissions[]`; subsequent changes go through the `Toolkit Permissions` sub-resource.
  name: Toolkit Credentials
- description: |-
    Sub-resource of **Toolkits** (Core / Access bounded context). The fine-grained PBAC tier — per-`(toolkit, credential)` allow / deny / require-approval rules evaluated server-side. Rules use a priority model: `deny` > `require-approval` > `allow` — the strictest matching rule wins. Absence of a matching rule is an implicit deny. System rules (`_system: true`) participate in the same priority pool as user rules.

    The coarse JWT-embedded scope tier on `Toolkit.permissions` (`capabilities:execute`, `apis:read`) is checked separately and composes with these rules — both must allow.
  name: Toolkit Permissions
- description: |-
    Actor-agnostic, multi-item access-request surface (Core / Access bounded context). When an agent's brokered call is rejected by a permission rule — or the agent needs access it doesn't yet have — the agent files an `AccessRequest` containing one or more line items (`AccessRequestItem`). The request enters `pending` state and surfaces an `approve_url` that the agent presents to a human reviewer.

    Reviewers `:decide` individual items (approve or deny each); filers can `:amend` pending items (adjust rules or target) or `:withdraw` the entire request. Each item transitions independently; the envelope status reflects the aggregate (`pending` while any item is pending, `partially_approved` when some items are decided but others remain, terminal once all items resolve).

    Pending requests carry a TTL (default 7 days, configurable). Envelope lifecycle: `pending → partially_approved → approved | denied | withdrawn | expired`.

    **Identity scoping.** List and get operations are identity-scoped: filers see their own requests, reviewers see their inbox, `org:admin` sees all. Non-owners receive `404` (not `403`) to avoid leaking existence.

    **Security.** Mutating operations (`POST`, `:decide`, `:amend`, `:withdraw`) require `agents:write`; read operations require `agents:read`.
  name: Access Requests
- description: |-
    The `Api` aggregate root — what APIs are registered for this deployment, addressable by the loose `(vendor, name, version)` tuple. Every successful import lands a new immutable `ApiRevision`; the `Api` carries the live `current_revision_id` plus presentation metadata (`display_name`, `description`, `icon_url`).

    Mutation surfaces:

    - `POST /apis` — async import (url / inline). Returns 202 + `Job (kind=import)`.
    - `PATCH /apis/{vendor}/{name}/{version}` — metadata-only updates (display name, description, icon). Cannot mutate revisions or spec content.
    - `POST /apis/{vendor}/{name}/{version}/revisions/{revision_id}:promote` — make a draft revision live.
    - `POST /apis/{vendor}/{name}/{version}/revisions/{revision_id}:archive` — retire a draft revision.
    - `DELETE /apis/{vendor}/{name}/{version}` — deregister the API and all its revisions.

    Newly imported revisions are **never auto-promoted** — callers must explicitly `:promote` to flip the live pointer. Hot-path Broker calls can pin to a specific revision via the `Jentic-Revision` request header for testing without flipping the pointer.

    Sub-resources of an `Api` live under sibling tags: `API Operations` enumerates the operations exposed by a registered revision; `API Spec` returns the underlying OpenAPI document for tooling.
  name: APIs
- description: |-
    Sub-resource of **APIs** (Registry bounded context). Enumerate the operations exposed by a registered API — either the live (`current_revision_id`) view or a specific revision. Complements `Search` (ranked discovery) and `Inspect` (single-operation detail) by giving callers the deterministic list of every registered operation under one API without ranking, paging through `Search`, or parsing the spec.

    Each row is slim — the structural detail (parameters, response schema, security scheme) lives behind `_links.inspect` for callers that need it.
  name: API Operations
- description: |-
    Sub-resource of **APIs** (Registry bounded context). Download the underlying OpenAPI document for a registered API — either the live (`current_revision_id`) view or a specific revision. Supports `application/json`, `application/openapi+yaml`, and `application/yaml` via `Accept`-header content negotiation, with `Content-Disposition: attachment; filename="..."` so browser downloads work cleanly.

    By default the response includes any deployment-local overlays merged on top of the imported base. Pass `?overlays=false` to download the raw imported spec instead.
  name: API Spec
- description: |-
    The public API **catalog** — a registry-side browse/preview/import surface over the Jentic public-APIs GitHub manifest. Powers the Discover experience: list importable APIs (`GET /catalog`, keyset cursor-paginated), preview an entry's operations (`GET /catalog/{api_id}/operations`), refresh the cached manifest (`POST /catalog:refresh`, `org:admin`), and import an entry into the local registry (`POST /catalog/{api_id}:import`).

    The catalog is a cache of an upstream document, distinct from the local registry (`GET /apis`): `/apis` is what this deployment has imported, `/catalog` is what it *could* import. Each entry's `registered` flag reflects whether its `spec_url` already backs a local API revision. Import resolves to a plain fetchable spec URL and reuses the standard async import job — no catalog identity ever crosses into the importer.
  name: Catalog
- description: Lexical (full-text) search across registered operations, ranked by relevance. Returns a slim row per operation; each row carries `_links.inspect` pointing into the `Inspect` tag for full structural detail.
  name: Search
- description: Resolve a single registered operation to its full structural detail — parameters, response schema, security scheme, server URL. Heavier than `Lookup` (which is the Broker hot path) and separate from `Search` (which only returns ranked summaries). Supports JSON, Markdown, and OpenAPI YAML response formats via `Accept`-header content negotiation.
  name: Inspect
- description: The Broker's read interface into Registry — fast, narrow lookup from a real-world URL to a Jentic `operation_id`. Hot path; not for human use. The capability map names this as the Execution → Registry read interface.
  name: Lookup
- description: |-
    Free-form annotations attached to registry resources — an `Api`, an `ApiRevision`, a registered `operation_id`, an `ExecutionRecord`, or a `Credential`. Used to capture human or agent observations about quirks: *"this endpoint silently truncates email addresses to 64 chars"*, *"this credential rejects calls outside US business hours"*, *"this operation needs `Accept: application/json` even though the spec doesn't say so"*.

    Notes are an information surface for agents — they accumulate over time as the platform learns from real executions and surface back through `_links.notes` on the resources they annotate (woven in by individual surfaces as they need it).

    **Edit model.** Notes are editable via `PATCH`; each successful edit bumps a monotonic `revision` counter on the `Note`. Use the `If-Match` header on `PATCH` and `DELETE` to guard against concurrent modification.

    **Confidence promotion.** Notes carry both a `confidence` value (`observed | suspected | verified`) and a `confidence_source` (`client | platform_promoted`). Today only `client` is written by callers; the `platform_promoted` value is reserved for a future surface that auto-promotes `observed` notes to `verified` once enough matching `execution_feedback` accumulates.

    **Authentication.** Any authenticated principal (agent or human) can post any note type. Per-type policy (e.g. only humans may file `correction`) is enforced platform-side and not modelled in the spec.
  name: Notes
- description: |-
    OpenAPI Overlay 1.0 (`https://spec.openapis.org/overlay/v1.0.0`) documents that correct an imported spec without rewriting it. Overlays capture wrong required fields, missing security schemes, undocumented headers, silent payload truncation, and other places where the upstream spec disagrees with the upstream API's actual behaviour — without forking the spec or waiting for an upstream fix.

    Overlays attach to the `Api` aggregate (not to a specific `ApiRevision`) and continue to apply across revision bumps until materially superseded. The optional `target_revision_id` records the revision the overlay was authored against, for auditing.

    **Lifecycle.** New overlays start in `pending`. The Broker calls `POST /apis/{vendor}/{name}/{version}/overlays/{overlay_id}:confirm` after the first successful upstream execution that exercised an overlay-patched operation, transitioning the overlay to `confirmed`. This is the platform's only documented data-plane → control-plane writeback. Once `confirmed`, an overlay stays `confirmed` — repeated `:confirm` calls return `200` with the existing record unchanged.

    **Edit model.** Overlay documents are editable via `PATCH` only while `pending`. Once `confirmed` (or `deprecated`), the document is immutable — to change a confirmed overlay, submit a new one and let the old one age out via `DELETE` (which soft-deprecates).

    **Deletion.** `DELETE` is a **soft-deprecation** — the row is preserved with `status: deprecated` for audit. Deprecated overlays no longer apply to spec-download merges (`?overlays=false` becomes the default for that overlay) but stay queryable via `GET`. There is no hard-delete in this surface.

    **Authentication.** Any authenticated principal (agent or human) can submit, edit, confirm, or deprecate overlays. Platform-side rate limits gate abuse.
  name: Overlays
- description: Append-only audit log of every Broker call (sync or async) — timing, status, trace IDs, and the upstream API reference (`vendor:name:version`). Bodies are not stored. Records are written by the Broker; this surface is read-only. To walk the history of a single logical request that fanned out into multiple upstream calls, list with `?trace_id={trace_id}`.
  name: Executions
- description: In-flight async-job tracker for both Registry import jobs and Broker async-execution jobs — one uniform `Job` shape keyed by `kind`. Lifecycle only — type-specific result payloads (the imported revisions for `import`, upstream response body for `execution`) live under `/jobs/{job_id}/result`. Result availability follows the organisation-level retention policy (one-shot or TTL); once that expires, both `/jobs/{job_id}` and `/jobs/{job_id}/result` `404`.
  name: Jobs
- description: Curated, severity-tagged event stream surfaced to dashboards and operators. Each event is either **informational** (no action required, e.g. `import.completed`) or **actionable** (requires operator follow-up, e.g. `credential.expiring_soon`, `execution.repeated_failure`). Events reference the underlying `ExecutionRecord` or `Job` via `_links` and share `trace_id` for correlation. Subscribe live via `GET /events/stream` (Server-Sent Events) or poll `GET /events` with a `since=` filter.
  name: Events
- description: |-
    Part of the **Admin / Audit** bounded context — the human roster of the organisation. One organisation, many users; admin surfaces here cover create / list / read / update / delete plus the AIP-style action verbs (`:disable`, `:enable`, `:reissue-invite`). Self-service is intentionally minimal: `GET /users/me` to introspect, `POST /users/me:change-password` to rotate (which re-mints and returns a fresh token, clearing any `must_change_password` gate so the caller need not re-login).

    **First-run setup (no default credentials).** The platform ships with an empty users table — there is no seeded `admin@local` account. On a fresh install `GET /health` reports `setup_required: true` (with `next_step: create_admin`). The operator creates the first administrator via `POST /users:create-admin {email, password}`: a one-time, unauthenticated endpoint that succeeds only while no user exists, grants `org:admin`, and returns an auto-login `LoginResponse` with `must_change_password: false` (the operator chose the password, so there is no forced rotation). It **self-closes** — once any user exists it returns `410 setup_already_complete`, so it is safe to leave exposed during first boot; a single-row setup sentinel is the concurrency backstop against racing callers (even ones using different emails). After the first user exists, `setup_required` flips to `false`.

    **Onboarding flow.** Admins create new users via `POST /users` (no password supplied). The response carries a one-time `inv_…` invite token shown **once**; the admin hands it off out-of-band (Slack, 1Password, email — there is no platform-side email infrastructure in this revision). The new user redeems via `POST /users:redeem-invite {invite_token, password}` and is auto-logged-in via the returned `LoginResponse`. Tokens default to a 7-day TTL and are single-use; `:reissue-invite` issues a fresh one if the original is lost or expired.

    **Authentication.** Today only local (username + password) identity ships. The `User` schema carries `auth_provider: local | external` and an `external_subject_id` field reserved for future SSO integrations (Okta, Cognito, Azure AD); when SSO arrives, those users will be created via a separate provider-specific router. The on-the-wire token contract — `Authorization: Bearer <jwt>` — is unchanged either way.

    **Disabling and revocation.** `:disable` flips `active=false` and rejects subsequent `POST /auth/login`. **Existing JWTs keep working until they expire** (≤ 1 hour with the platform's default TTL). This is a deliberate trade-off; sub-minute revocation would require a server-side session table.
  name: Users
- description: |-
    Part of the **Admin / Audit** bounded context — the catalogue of grantable permission strings. Permissions are namespaced `resource:action` strings (`users:write`, `capabilities:execute`, `credentials:read`, …) gating every other surface in the API. The set is platform-defined and small; `GET /permissions` returns it in full, with each entry describing what it does, what it implies (the static implication map; e.g. `capabilities:execute` implies `apis:read` and `executions:read`), and whether the calling user is authorised to grant it.

    One reserved superpower short-circuits individual checks in code: `org:admin` (full deployment-wide access, granted via direct DB action). It is not enumerated to non-holders by `GET /permissions`, and is rejected by `PUT /users/{user_id}/permissions` from any caller who doesn't already hold it.

    The same vocabulary is used for `User.permissions` and for `Toolkit.permissions` — coarse JWT-embedded scopes — so the one catalogue covers both. Per-binding fine-grained `PermissionRule[]` (the inner PBAC tier) lives separately under the `Toolkit Permissions` tag.
  name: Permissions
- description: Operational endpoints for service health and platform tooling. Not part of any bounded context — surfaced here so orchestrators and load balancers have a stable probe target.
  name: System
- description: Identity introspection for the calling principal (human, agent, or service account) — `GET /me` returns the resolved subject, scopes, and permissions behind the presented token.
  name: Identity
- description: Agent actors — autonomous principals that call the Broker. Covers the agent lifecycle (list, read, approve / deny, enable / disable, archive) and the toolkits bound to each agent.
  name: Agents
- description: Machine principals for non-interactive integrations — lifecycle (create, list, read, approve / deny, enable / disable, archive) mirroring the agent surface.
  name: Service Accounts
- description: OAuth 2.0 / OIDC endpoints exposed by the platform authorization server — the authorize, token, introspection, revocation, and assertion-mint endpoints plus the redirect callback.
  name: OAuth
- description: Dynamic agent registration (RFC 7591-style) — register a new agent client, poll registration status, update, or delete a registration.
  name: Agent Registration
- description: Unauthenticated metadata discovery — the JWKS document and OAuth authorization server metadata under `/.well-known/*`.
  name: Discovery
- description: Unified actor directory — a lightweight read-only view across all actor types (users, agents, service accounts). Returns ID-to-name mappings for UI cache hydration so dashboards can display friendly names wherever an `actor_id` appears.
  name: Actors
- description: Append-only administrative audit trail — who did what, when. Distinct from `Executions` (brokered upstream calls); this records control-plane mutations.
  name: Audit
- description: Dashboard-oriented aggregation endpoints — execution volume, success/failure ratios, and top operations over a bounded time window. Results are cached in-process (TTL ~120 s) so concurrent dashboard viewers never stampede the database.
  name: Monitoring
- description: Runtime, DB-backed platform configuration. Lets an operator set, read, and list configuration that previously required hand-editing backend YAML and restarting the server — starting with credential provider configs (e.g. Pipedream). A successful write rebuilds the in-process provider registry so the change takes effect without a restart. Secret fields (e.g. `client_secret`) are encrypted at rest and redacted on read. **Topology note:** in the combined (single-process) deployment a write takes effect immediately for all surfaces. In a multi-process deployment the control/broker processes pick up the new config at their next boot, not the instant the admin write lands; cross-process propagation is a tracked follow-up.
  name: Configuration
