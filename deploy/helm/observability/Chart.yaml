apiVersion: v2
name: observability
description: |
  LGTM-lite observability stack for local jentic-one development:
  Grafana + Loki (logs) + Tempo (traces) + Prometheus (metrics) +
  a central OpenTelemetry Collector that app pods' sidecars forward to.

  Deployed as a separate release into its own namespace so app and
  platform concerns stay decoupled.
type: application
version: 0.14.3 # x-release-please-version
appVersion: "0.14.3" # x-release-please-version

dependencies:
  - name: grafana
    version: "12.4.1"
    repository: https://grafana-community.github.io/helm-charts
    condition: grafana.enabled

  - name: loki
    version: "6.55.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled

  - name: tempo
    version: "1.24.4"
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled

  - name: prometheus
    version: "27.40.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled

  - name: opentelemetry-collector
    version: "0.131.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: otelcollector
    condition: otelcollector.enabled

  # Log shipper. Runs as a DaemonSet, tails /var/log/pods on each node and
  # pushes to Loki. Independent of the OTel Collector pipeline above so that
  # logs are decoupled from traces/metrics.
  - name: alloy
    version: "1.8.2"
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled
