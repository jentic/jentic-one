apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-admin
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: admin
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- include "common.pod-annotations" . | nindent 6 }}
    spec:
      containers:
        - name: admin
          image: {{ include "common.image" . | quote }}
          ports:
            - containerPort: 8000
          env:
{{- range $k, $v := .Values.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
{{- end }}
{{ include "common.logging-env" . | indent 12 }}
{{ include "common.metrics-env" . | indent 12 }}
{{ include "common.db-env" . | indent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path | default "/health" }}
              port: {{ .Values.healthCheck.port | default 8000 }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path | default "/health" }}
              port: {{ .Values.healthCheck.port | default 8000 }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.global.observability.otel.enabled }}
{{ include "common.otel-sidecar" . | indent 8 }}
        {{- end }}
      {{- if .Values.global.observability.otel.enabled }}
      volumes:
{{ include "common.otel-config-volume" . | indent 8 }}
      {{- end }}
