name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'uv.lock'
      # Self-reference: ensures edits to this workflow are validated on the PR that makes them.
      - '.github/workflows/ci-backend.yml'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.11'
          version: "0.8.5"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run lint
        run: uv run poe lint:ci

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.11'
          version: "0.8.5"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run backend tests
        env:
          JENTIC_TELEMETRY: "off"
        run: uv run poe test
