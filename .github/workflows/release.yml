# Release pipeline — runs on a vX.Y.Z tag (created by merging the release-please
# Release PR). Gated stages:
#
#   1. gate          — build the app + run every migration on a FRESH ephemeral
#                      SQLite DB (no Postgres, no real secrets — the bundled
#                      local-dev key) and assert /health serves the tag version.
#                      Nothing publishes if this fails.
#   2. publish-image — build the `app` container image and push it to GHCR
#                      (ghcr.io/<owner>/jentic-one-app). One image serves every
#                      surface via JENTIC__APPS; this is the image self-hosters
#                      pull (see deploy/README.md "Self-hosted"). needs: gate.
#   3. release       — GoReleaser builds the signed, checksummed jenticctl +
#                      jentic binaries (cosign keyless via OIDC + syft SBOMs) and
#                      pushes the Homebrew cask. This is the install (see
#                      docs/releasing.md). needs: gate.
#
# Only tags trigger this; branch CI stays in ci.yml. GITHUB_TOKEN can create the
# release assets here because we're already ON the tag (no downstream trigger
# needed — release-please used the App token to make the tag that started us).
# GITHUB_TOKEN also has packages:write for the GHCR push (scoped per-job).
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Build + migrate + /health gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Sync (locked)
        run: uv sync --locked
      - name: Migrate a fresh ephemeral SQLite DB
        # Uses config/local-sqlite.yaml — bundled LOCAL-DEV-ONLY encryption key,
        # a throwaway .data/ SQLite file. No production keyset, no publish token.
        # mkdir mirrors the Makefile's migrate-sqlite target (SQLite won't create
        # the parent dir).
        run: |
          mkdir -p .data
          JENTIC_CONFIG_FILE=config/local-sqlite.yaml uv run python -m jentic_one.migrations.run
      - name: Assert every DB actually reached an Alembic head
        # /health is dependency-free by design, so it can't attest DB state on its
        # own. This step makes the gate real: it fails if a target didn't migrate
        # (empty/absent alembic_version) or if the runner no-op'd (fewer migrated
        # DBs than configured targets) — i.e. a broken or silently-skipped
        # migration blocks the release.
        run: |
          JENTIC_CONFIG_FILE=config/local-sqlite.yaml uv run python - <<'PY'
          import sqlite3, sys
          from pathlib import Path
          from jentic_one.migrations.targets import DB_TARGETS

          targets = list(DB_TARGETS)
          if not targets:
              sys.exit("::error::no migration targets configured (DB_TARGETS is empty)")

          missing = []
          for name in targets:
              db = Path(".data") / f"{name}.db"
              if not db.exists():
                  missing.append(f"{name}: db file missing ({db})")
                  continue
              con = sqlite3.connect(db)
              try:
                  row = con.execute("SELECT version_num FROM alembic_version").fetchone()
              except sqlite3.OperationalError:
                  missing.append(f"{name}: no alembic_version table")
                  continue
              finally:
                  con.close()
              if not row or not row[0]:
                  missing.append(f"{name}: alembic_version empty")
              else:
                  print(f"  {name} at head {row[0]}")

          if missing:
              sys.exit("::error::migration gate failed:\n" + "\n".join(missing))
          print(f"OK: all {len(targets)} target DB(s) migrated to a head")
          PY
      - name: Boot the app and assert /health serves the tag version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # reload:false + run in its own process group so the trap reliably reaps
          # the uvicorn server (not just the `uv run` wrapper).
          JENTIC_CONFIG_FILE=config/local-sqlite.yaml JENTIC__SERVER__RELOAD=false \
            setsid uv run python -m jentic_one >app.log 2>&1 &
          APP_PGID=$!
          trap 'kill -- -"$APP_PGID" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then break; fi
            # Fail fast with logs if the app died instead of spinning the full 30s.
            if ! kill -0 "$APP_PGID" 2>/dev/null; then
              echo "::error::app process exited before serving /health"; cat app.log; exit 1
            fi
            sleep 1
          done
          BODY="$(curl -fsS http://127.0.0.1:8000/health)" || { cat app.log; exit 1; }
          echo "health: $BODY"
          # jq (preinstalled on ubuntu runners) is robust to JSON formatting,
          # unlike a literal substring grep.
          GOT="$(printf '%s' "$BODY" | jq -r '.version')"
          if [ "$GOT" != "$TAG" ]; then
            echo "::error::/health version ($GOT) does not match tag ($TAG)" >&2
            cat app.log
            exit 1
          fi

  publish-image:
    name: Publish app image to GHCR
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the app image to GHCR (ghcr.io/<owner>/jentic-one-app)
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # One `app` image serves every surface — the surface set is chosen at
      # runtime via JENTIC__APPS (registry,admin,control,auth vs the sole broker;
      # see deploy/README.md "Self-hosted"). A single published `app` image
      # therefore covers the whole self-hosted app + broker topology.
      #
      # We build the same way `make build-app` does (build-base first, then the
      # app image that FROMs the python-base:runtime / :builder stages by tag),
      # then push to GHCR. github.repository_owner preserves case but GHCR repos
      # must be lower-case, so lower-case the owner for the image name.
      # Single-arch (amd64) for now; multi-arch is a documented follow-up
      # (deploy/README.md "What's deferred").
      - name: Build and push the app image
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/jentic-one-app"
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(git rev-parse --short HEAD)"
          make build-base
          docker build -f deploy/docker/app.Dockerfile \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${SHA}" \
            -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:${SHA}"
          docker push "${IMAGE}:latest"
          echo "Pushed ${IMAGE} (${VERSION}, ${SHA}, latest)"

  release:
    name: GoReleaser (signed CLI binaries)
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach artifacts to the GitHub Release
      id-token: write # cosign keyless (fulcio/OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # GoReleaser needs full history/tags
      - uses: actions/setup-go@v7
        with:
          go-version-file: cli/go.mod
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft (SBOMs)
        uses: anchore/sbom-action/download-syft@v0
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT/App token with contents:write on jentic/homebrew-tap so the cask
          # can be pushed cross-repo (GITHUB_TOKEN is scoped to THIS repo only).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          COSIGN_YES: "true"
      # Mirror the app release tag onto the CLI's Go module path. The CLI lives in
      # a subdirectory (module github.com/jentic/jentic-one/cli), so `go get
      # .../cli@vX.Y.Z` only resolves if a `cli/vX.Y.Z` git tag exists. We point it
      # at the SAME commit as the app's vX.Y.Z tag, so the module version and the
      # app release are always lockstep-identical. Runs LAST so a tagging hiccup
      # never blocks GoReleaser publishing the binaries. The `cli/v*` tag can't
      # match this workflow's `v*.*.*` trigger, so there's no recursive release run.
      - name: Tag the CLI Go module at the release version
        run: |
          set -euo pipefail
          CLI_TAG="cli/${GITHUB_REF_NAME}"
          if git rev-parse -q --verify "refs/tags/${CLI_TAG}" >/dev/null; then
            echo "${CLI_TAG} already exists — nothing to do"
          else
            # Annotated tags need a committer identity; runners have none. Attribute
            # to GitHub's Actions bot (matches the convention for CI-created objects).
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${CLI_TAG}" -m "${CLI_TAG}" "${GITHUB_SHA}"
            git push origin "${CLI_TAG}"
          fi
