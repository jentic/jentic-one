name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ARAZZO_BUILDER_APP_ID }}
          private-key: ${{ secrets.ARAZZO_BUILDER_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx --yes --package semantic-release --package @semantic-release/exec --package @semantic-release/git semantic-release

      - name: Extract released version
        id: version
        run: |
          # semantic-release creates the tag via GitHub API — fetch it
          git fetch --tags
          tag=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [ -n "$tag" ]; then
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: release
    if: needs.release.outputs.version != ''
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
