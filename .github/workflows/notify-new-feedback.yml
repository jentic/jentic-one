name: Notify Slack on new feedback

# Posts every newly opened issue to Slack via an incoming webhook.
# Highlights severity:blocker / severity:major so urgent pain points stand out.
#
# Setup: add a repo secret SLACK_WEBHOOK_URL (a Slack incoming webhook URL).
# If the secret is absent the job no-ops (so forks / dry runs don't fail).
#
# Originally authored by @sophie-jentic (PR #557); carried forward here with the
# review fixes applied (UTF-8-safe truncation, exact-match label emojis, and a
# soft-fail so a transient Slack error doesn't mark the run red).

on:
  issues:
    types: [opened]

permissions:
  contents: none

concurrency:
  group: notify-new-feedback-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post to Slack
        shell: bash
        env:
          # A UTF-8 locale so bash ${var:0:N} slices by character, not byte.
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
          NUMBER: ${{ github.event.issue.number }}
          AUTHOR: ${{ github.event.issue.user.login }}
          LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          BODY: ${{ github.event.issue.body }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification."
            exit 0
          fi

          # Split labels into an array on the ", " join separator.
          labels=()
          if [ -n "$LABELS" ]; then
            IFS=',' read -ra raw_labels <<< "$LABELS"
            for raw in "${raw_labels[@]}"; do
              lbl="${raw#"${raw%%[![:space:]]*}"}"   # ltrim
              lbl="${lbl%"${lbl##*[![:space:]]}"}"   # rtrim
              [ -n "$lbl" ] && labels+=("$lbl")
            done
          fi

          # Per-label emoji (exact match — no substring collisions).
          emoji_for() {
            case "$1" in
              bug)                le="🐛" ;;
              pain-point)         le="🤕" ;;
              enhancement)        le="✨" ;;
              idea)               le="💡" ;;
              documentation)      le="📖" ;;
              question)           le="❓" ;;
              severity:blocker)   le="🚨" ;;
              severity:major)     le="⚠️" ;;
              severity:minor)     le="🔹" ;;
              fit:*)              le="🎯" ;;
              feasibility:*)      le="🛠️" ;;
              area:*)             le="🧭" ;;
              needs-triage)       le="🕵️" ;;
              needs-info)         le="💬" ;;
              needs-human)        le="🙋" ;;
              confirmed)          le="✅" ;;
              duplicate)          le="🔁" ;;
              agent-filed)        le="🤖" ;;
              ai-intake)          le="📥" ;;
              *)                  le="🏷️" ;;
            esac
            printf '%s' "$le"
          }

          # Header emoji: highest-precedence exact label wins.
          header_emoji="📝"
          for lbl in "${labels[@]}"; do
            case "$lbl" in severity:blocker) header_emoji="🚨" ;; esac
          done
          if [ "$header_emoji" = "📝" ]; then
            for lbl in "${labels[@]}"; do case "$lbl" in severity:major) header_emoji="⚠️" ;; esac; done
          fi
          if [ "$header_emoji" = "📝" ]; then
            for lbl in "${labels[@]}"; do case "$lbl" in pain-point) header_emoji="🤕" ;; esac; done
          fi
          if [ "$header_emoji" = "📝" ]; then
            for lbl in "${labels[@]}"; do case "$lbl" in bug) header_emoji="🐛" ;; esac; done
          fi

          labels_fmt=""
          for lbl in "${labels[@]}"; do
            labels_fmt="${labels_fmt}$(emoji_for "$lbl") \`${lbl}\`   "
          done
          [ -z "$labels_fmt" ] && labels_fmt="_no labels yet_"

          # Clean the body to a single line, then character-slice to 240.
          cleaned="$(printf '%s' "$BODY" \
            | sed 's/^#\{1,\}[[:space:]]*//; s/\r//g' \
            | tr '\n' ' ' \
            | sed 's/  */ /g; s/^ *//; s/ *$//')"
          summary="${cleaned:0:240}"
          if [ -z "$summary" ]; then
            summary="_No description provided._"
          elif [ "${#cleaned}" -gt 240 ]; then
            summary="${summary}…"
          fi

          # Build the Slack Block Kit payload with jq so all fields are escaped.
          payload=$(jq -n \
            --arg header "$header_emoji New feedback: #$NUMBER" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg author "$AUTHOR" \
            --arg labels "$labels_fmt" \
            --arg summary "$summary" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: $header, emoji: true } },
                { type: "section", text: { type: "mrkdwn", text: ("*<" + $url + "|" + $title + ">*") } },
                { type: "section", text: { type: "mrkdwn", text: $summary } },
                { type: "section", text: { type: "mrkdwn", text: ("*Labels:*\n" + $labels) } },
                { type: "context", elements: [
                    { type: "mrkdwn", text: ("Filed by *" + $author + "*") }
                ] }
              ]
            }')

          code=$(curl -sS -o /tmp/resp -w "%{http_code}" \
            -X POST -H 'Content-type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL" || echo "000")
          if [ "$code" != "200" ]; then
            # Soft-fail: a Slack hiccup should not mark the issue's CI red.
            echo "::warning::Slack notification failed (HTTP $code): $(head -c 500 /tmp/resp 2>/dev/null)"
            exit 0
          fi
          echo "Slack notification sent (HTTP 200)."
