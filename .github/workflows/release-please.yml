# release-please keeps a standing Release PR ("chore(main): release X.Y.Z").
# Merging that PR is the release: it bumps the version across pyproject.toml,
# uv.lock, and every Helm Chart.yaml (see release-please-config.json), writes
# CHANGELOG.md, tags vX.Y.Z, and creates the GitHub Release. The tag then fires
# the release pipeline (see release.yml) which builds + gates + publishes the
# signed CLI binaries.
#
# Token: we mint a short-lived GitHub App token instead of GITHUB_TOKEN because
# a tag/release created with GITHUB_TOKEN does NOT trigger downstream workflows
# (release.yml's `on: push: tags`). The App is scoped to contents:write +
# issues:write + pull-requests:write on this repo only (issues:write is required
# because release-please creates its `autorelease:*` bookkeeping labels via the
# Issues API on the first run). See docs/releasing.md.
#
# SETUP REQUIRED (repo/org admin): create the App, install it on this repo, and
# add these secrets:
#   RELEASE_PLEASE_APP_ID          - the GitHub App's App ID
#   RELEASE_PLEASE_APP_PRIVATE_KEY - the App's private key (PEM)
# The App's repository permissions MUST include Contents: RW, Issues: RW, and
# Pull requests: RW (the workflow `permissions:` below cannot exceed the App's).
name: release-please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write # release-please creates its autorelease:* labels via the Issues API
      pull-requests: write
    steps:
      - name: Mint a scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When release-please opens/updates its "chore(main): release X.Y.Z" PR,
      # the version bump can invalidate generated artifacts (the control-plane
      # OpenAPI spec + the UI client derived from it). Regenerate them on the PR
      # branch and push back so the Release PR is self-consistent and does not
      # trip the openapi-client-drift / conformance gates when merged.
      - name: Set up toolchain
        if: ${{ steps.release.outputs.pr }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        if: ${{ steps.release.outputs.pr }}
        run: uv python install 3.12

      - name: Set up Node.js
        if: ${{ steps.release.outputs.pr }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Regenerate OpenAPI specs
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ fromJson(steps.release.outputs.pr).number }}
          # The App slug from the token step; used to derive the committer
          # identity so this commit is attributed to the same bot that authors
          # the rest of the Release PR (we push with the App token, not
          # GITHUB_TOKEN — see the header comment).
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          # Check out the release-please PR branch so regenerated files are
          # committed onto the Release PR, not a detached HEAD.
          gh pr checkout "$PR_NUMBER"

          # Install backend deps, then regenerate the control spec + ui/openapi.json.
          make sync
          make openapi

          # Refresh the generated UI client from the (possibly updated) spec.
          cd ui && npm ci && npm run codegen
          cd ..

          # Attribute the commit to the release-please App's bot user (the token
          # actually pushing this), matching GitHub's <slug>[bot] convention:
          #   name  = <slug>[bot]
          #   email = <bot-user-id>+<slug>[bot]@users.noreply.github.com
          BOT_NAME="${APP_SLUG}[bot]"
          BOT_USER_ID="$(gh api "/users/${BOT_NAME}" --jq .id)"
          git config user.name "$BOT_NAME"
          git config user.email "${BOT_USER_ID}+${BOT_NAME}@users.noreply.github.com"
          git add openapi/ ui/

          if ! git diff --staged --quiet; then
            git commit -m "chore: regenerate openapi specs for version bump"
            git push
          fi
