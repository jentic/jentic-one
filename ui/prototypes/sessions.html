<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Jentic One — Sessions</title>
		<style>
			:root {
				--bg: #0e1a1d;
				--bg2: #12262b;
				--panel: #14282e;
				--panel2: #173038;
				--panel3: #0b1518;
				--line: #244049;
				--line2: #2f5560;
				--fg: #e6f1f2;
				--dim: #9fb6bb;
				--mute: #6f8a90;
				--accent: #2dd4bf;
				--accent2: #38bdf8;
				--allow: #34d399;
				--deny: #f87171;
				--warn: #fbbf24;
				--violet: #a78bfa;
				--pink: #f0abfc;
				--mono: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
				--sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				background: var(--bg);
				color: var(--fg);
				font-family: var(--sans);
				font-size: 14px;
				-webkit-font-smoothing: antialiased;
			}
			.app {
				display: flex;
				height: 100vh;
				overflow: hidden;
			}
			::-webkit-scrollbar {
				width: 10px;
				height: 10px;
			}
			::-webkit-scrollbar-thumb {
				background: #20404a;
				border-radius: 6px;
			}
			::-webkit-scrollbar-track {
				background: transparent;
			}

			/* nav */
			.nav {
				width: 210px;
				flex: 0 0 210px;
				background: #0b1518;
				border-right: 1px solid var(--line);
				padding: 16px 12px;
				display: flex;
				flex-direction: column;
				gap: 4px;
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 9px;
				padding: 6px 8px 14px;
			}
			.brand .d {
				width: 22px;
				height: 22px;
				border-radius: 6px;
				background: linear-gradient(135deg, var(--accent), var(--accent2));
			}
			.brand b {
				font-size: 15px;
			}
			.nav a {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 8px 10px;
				border-radius: 8px;
				color: var(--dim);
				text-decoration: none;
				font-size: 13.5px;
				cursor: pointer;
			}
			.nav a:hover {
				background: var(--panel);
				color: var(--fg);
			}
			.nav a.on {
				background: var(--panel2);
				color: var(--fg);
			}
			.nav a .ic {
				width: 16px;
				text-align: center;
				opacity: 0.85;
			}
			.nav .sp {
				flex: 1;
			}
			.nav .foot {
				color: var(--mute);
				font-size: 11px;
				padding: 8px 10px;
				border-top: 1px solid var(--line);
				line-height: 1.5;
			}

			/* main */
			.main {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			.top {
				height: 56px;
				flex: 0 0 56px;
				border-bottom: 1px solid var(--line);
				display: flex;
				align-items: center;
				gap: 14px;
				padding: 0 20px;
				background: var(--bg2);
			}
			.crumbs {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 13px;
				color: var(--dim);
			}
			.crumbs .s {
				color: var(--mute);
			}
			.crumbs a {
				color: var(--accent);
				cursor: pointer;
			}
			.crumbs b {
				color: var(--fg);
			}
			.grow {
				flex: 1;
			}
			.pill {
				font-family: var(--mono);
				font-size: 11px;
				color: var(--dim);
				border: 1px solid var(--line2);
				border-radius: 999px;
				padding: 4px 10px;
			}
			.pill .g {
				color: var(--allow);
			}
			.content {
				flex: 1;
				overflow: auto;
				padding: 22px 26px 70px;
			}

			.h1 {
				font-size: 20px;
				font-weight: 650;
				margin: 0 0 3px;
			}
			.sub {
				color: var(--dim);
				font-size: 13px;
				margin: 0 0 18px;
			}
			.muted {
				color: var(--mute);
			}
			.mono {
				font-family: var(--mono);
			}
			.back {
				color: var(--accent);
				cursor: pointer;
				font-size: 13px;
				display: inline-flex;
				gap: 6px;
				margin-bottom: 12px;
			}
			.back:hover {
				text-decoration: underline;
			}

			.chip {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				font-size: 11.5px;
				font-family: var(--mono);
				padding: 3px 8px;
				border-radius: 6px;
				border: 1px solid var(--line2);
				color: var(--dim);
			}
			.chip.allow {
				color: var(--allow);
				border-color: #1f5a48;
				background: #0f2c25;
			}
			.chip.deny {
				color: var(--deny);
				border-color: #5c2b2e;
				background: #2a1416;
			}
			.chip.warn {
				color: var(--warn);
				border-color: #5c4a1f;
				background: #2a2312;
			}
			.chip.info {
				color: var(--accent2);
				border-color: #244a5c;
				background: #10262e;
			}
			.chip.get {
				color: #7ee787;
				border-color: #2a5a34;
				background: #0f2417;
			}
			.chip.post {
				color: #79c0ff;
				border-color: #1f4a6b;
				background: #0d2233;
			}
			.dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				display: inline-block;
			}
			.dot.allow {
				background: var(--allow);
			}
			.dot.deny {
				background: var(--deny);
			}
			.dot.warn {
				background: var(--warn);
			}
			.dot.info {
				background: var(--accent2);
			}

			/* filters */
			.filters {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				margin-bottom: 16px;
				align-items: center;
			}
			.filters input,
			.filters select {
				background: var(--panel);
				border: 1px solid var(--line2);
				color: var(--fg);
				border-radius: 8px;
				padding: 8px 11px;
				font-size: 13px;
				font-family: var(--sans);
				outline: none;
			}
			.filters input:focus,
			.filters select:focus {
				border-color: var(--accent);
			}
			.filters input.search {
				min-width: 280px;
			}
			.seg {
				display: inline-flex;
				border: 1px solid var(--line2);
				border-radius: 8px;
				overflow: hidden;
			}
			.seg button {
				background: var(--panel);
				border: 0;
				color: var(--dim);
				padding: 8px 12px;
				font-size: 12.5px;
				cursor: pointer;
			}
			.seg button.on {
				background: var(--panel2);
				color: var(--fg);
			}
			.seg button + button {
				border-left: 1px solid var(--line2);
			}

			.stats {
				display: grid;
				grid-template-columns: repeat(6, 1fr);
				gap: 12px;
				margin-bottom: 20px;
			}
			.stat {
				background: var(--panel);
				border: 1px solid var(--line);
				border-radius: 12px;
				padding: 14px 16px;
			}
			.stat .k {
				color: var(--mute);
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}
			.stat .v {
				font-size: 22px;
				font-weight: 650;
				margin-top: 4px;
			}
			.stat .v small {
				font-size: 12px;
				color: var(--dim);
				font-weight: 400;
			}

			.card {
				background: var(--panel);
				border: 1px solid var(--line);
				border-radius: 12px;
				overflow: hidden;
			}
			table {
				width: 100%;
				border-collapse: collapse;
			}
			thead th {
				text-align: left;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: var(--mute);
				padding: 11px 16px;
				border-bottom: 1px solid var(--line);
				font-weight: 600;
				background: var(--bg2);
			}
			tbody td {
				padding: 12px 16px;
				border-bottom: 1px solid var(--line);
				font-size: 13px;
			}
			tbody tr:last-child td {
				border-bottom: 0;
			}
			tbody tr.clk {
				cursor: pointer;
			}
			tbody tr.clk:hover {
				background: var(--panel2);
			}
			.aname {
				font-weight: 600;
				display: flex;
				align-items: center;
				gap: 9px;
			}
			.av {
				width: 26px;
				height: 26px;
				border-radius: 7px;
				background: linear-gradient(135deg, #1f4a52, #2b6b74);
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 12px;
				font-family: var(--mono);
				color: #bfeee9;
			}
			.bar {
				height: 6px;
				border-radius: 3px;
				background: var(--line);
				overflow: hidden;
				width: 90px;
				display: inline-block;
				vertical-align: middle;
			}
			.bar > i {
				display: block;
				height: 100%;
				background: var(--allow);
			}
			.bar > i.warn {
				background: var(--warn);
			}

			/* playground */
			.pgwrap {
				display: grid;
				grid-template-columns: 1fr 340px;
				gap: 16px;
			}
			.pg {
				position: relative;
				background: radial-gradient(
					circle at 1px 1px,
					rgba(255, 255, 255, 0.05) 1px,
					transparent 0
				);
				background-size: 22px 22px;
				background-color: #0c181b;
				border: 1px solid var(--line);
				border-radius: 14px;
				padding: 30px 24px;
				min-height: 360px;
				overflow: auto;
			}
			.pgt {
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.6px;
				color: var(--mute);
				margin-bottom: 22px;
			}
			.tree {
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			.node {
				position: relative;
				background: var(--panel2);
				border: 1px solid var(--line2);
				border-radius: 12px;
				padding: 12px 14px;
				min-width: 210px;
				max-width: 250px;
				cursor: pointer;
				transition:
					border-color 0.12s,
					transform 0.12s;
			}
			.node:hover {
				border-color: var(--accent);
				transform: translateY(-1px);
			}
			.node.root {
				border-color: var(--accent2);
				background: #12303a;
			}
			.node.deny {
				border-left: 3px solid var(--deny);
			}
			.node.allow {
				border-left: 3px solid var(--allow);
			}
			.node .nl {
				font-weight: 600;
				font-size: 13px;
				margin-bottom: 4px;
				display: flex;
				align-items: center;
				gap: 7px;
			}
			.node .nm {
				font-family: var(--mono);
				font-size: 10.5px;
				color: var(--mute);
			}
			.node .ns {
				display: flex;
				gap: 6px;
				margin-top: 8px;
				flex-wrap: wrap;
			}
			.node .ns span {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--dim);
				background: #0e2229;
				border: 1px solid var(--line);
				border-radius: 5px;
				padding: 2px 6px;
			}
			.conn {
				width: 2px;
				height: 26px;
				background: var(--line2);
			}
			.kids {
				display: flex;
				gap: 22px;
				flex-wrap: wrap;
				justify-content: center;
				position: relative;
			}
			.kid {
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			.kid::before {
				content: '';
				width: 2px;
				height: 20px;
				background: var(--line2);
				margin-bottom: 6px;
			}

			.side {
				display: flex;
				flex-direction: column;
				gap: 14px;
			}
			.side .card {
				padding: 16px;
			}
			.side h4 {
				margin: 0 0 12px;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: var(--mute);
			}
			.kv {
				display: flex;
				justify-content: space-between;
				gap: 12px;
				padding: 7px 0;
				border-bottom: 1px solid var(--line);
				font-size: 13px;
			}
			.kv:last-child {
				border-bottom: 0;
			}
			.kv .k {
				color: var(--dim);
			}
			.kv .v {
				font-family: var(--mono);
				font-size: 12px;
				text-align: right;
			}
			.cta {
				display: block;
				width: 100%;
				text-align: center;
				background: var(--accent);
				color: #06231f;
				font-weight: 650;
				border: 0;
				border-radius: 10px;
				padding: 11px;
				cursor: pointer;
				font-size: 13px;
			}
			.cta:hover {
				filter: brightness(1.08);
			}
			.cta.ghost {
				background: transparent;
				border: 1px solid var(--line2);
				color: var(--fg);
			}

			/* trace layout: two columns (chat | tool calls) */
			.trace {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 18px;
				align-items: start;
			}
			.col h4 {
				margin: 2px 0 12px;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: var(--mute);
				display: flex;
				gap: 8px;
				align-items: center;
			}

			/* chat turns */
			.turn {
				border: 1px solid var(--line);
				border-radius: 10px;
				margin-bottom: 10px;
				overflow: hidden;
				background: var(--panel);
			}
			.turn .th {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 8px 12px;
				background: var(--bg2);
				border-bottom: 1px solid var(--line);
				cursor: pointer;
			}
			.turn .rl {
				font-size: 11px;
				font-family: var(--mono);
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}
			.turn.assistant .rl {
				color: var(--accent);
			}
			.turn.tool .rl {
				color: var(--violet);
			}
			.turn .tt {
				margin-left: auto;
				font-family: var(--mono);
				font-size: 10.5px;
				color: var(--mute);
			}
			.turn .tb {
				padding: 11px 13px;
				font-size: 13px;
				line-height: 1.55;
				white-space: pre-wrap;
				color: var(--fg);
			}
			.turn .toolrow {
				display: flex;
				gap: 8px;
				padding: 0 13px 11px;
				flex-wrap: wrap;
			}
			.tag {
				font-family: var(--mono);
				font-size: 10.5px;
				padding: 3px 8px;
				border-radius: 6px;
				border: 1px solid var(--line2);
				color: var(--pink);
				background: #2a1830;
			}
			.tag.spawn {
				color: var(--accent2);
				background: #0d2233;
				border-color: #1f4a6b;
			}

			/* tool call cards (right col) */
			.tccard {
				border: 1px solid var(--line);
				border-radius: 10px;
				margin-bottom: 10px;
				background: var(--panel);
				overflow: hidden;
			}
			.tccard.deny {
				border-left: 3px solid var(--deny);
			}
			.tccard.allow {
				border-left: 3px solid var(--allow);
			}
			.tch {
				display: flex;
				align-items: center;
				gap: 9px;
				padding: 10px 13px;
				cursor: pointer;
			}
			.tch:hover {
				background: var(--panel2);
			}
			.req {
				font-family: var(--mono);
				font-size: 12px;
				color: var(--fg);
			}
			.tch .tt {
				margin-left: auto;
				font-family: var(--mono);
				font-size: 10.5px;
				color: var(--mute);
			}
			.tcbody {
				border-top: 1px solid var(--line);
				padding: 12px 13px;
				display: none;
			}
			.tcbody.open {
				display: block;
			}
			.lbl {
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: var(--mute);
				margin: 10px 0 5px;
			}
			.lbl:first-child {
				margin-top: 0;
			}
			.pre {
				background: var(--panel3);
				border: 1px solid var(--line);
				border-radius: 8px;
				padding: 11px;
				font-family: var(--mono);
				font-size: 11.5px;
				color: var(--dim);
				white-space: pre-wrap;
				word-break: break-word;
				max-height: 260px;
				overflow: auto;
			}
			.metarow {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
				margin-top: 2px;
			}

			/* drawer */
			.scrim {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.5);
				z-index: 50;
			}
			.drawer {
				position: fixed;
				top: 0;
				right: 0;
				bottom: 0;
				width: 520px;
				background: var(--bg2);
				border-left: 1px solid var(--line2);
				z-index: 51;
				padding: 22px 24px;
				overflow: auto;
				box-shadow: -20px 0 40px rgba(0, 0, 0, 0.4);
			}
			.drawer h3 {
				margin: 0 0 2px;
				font-size: 16px;
			}
			.drawer .x {
				position: absolute;
				top: 18px;
				right: 20px;
				cursor: pointer;
				color: var(--mute);
				font-size: 22px;
			}
			.drawer .x:hover {
				color: var(--fg);
			}
			.sect {
				margin-top: 18px;
			}
			.sect h5 {
				margin: 0 0 8px;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: var(--mute);
			}
			.hidden {
				display: none !important;
			}
			.empty {
				color: var(--mute);
				padding: 24px;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div class="app">
			<aside class="nav">
				<div class="brand"><span class="d"></span><b>Jentic One</b></div>
				<a><span class="ic">◱</span> Dashboard</a>
				<a><span class="ic">◈</span> Registry</a>

			</aside>
			<div class="main">

					<div class="crumbs" id="crumbs"></div>

					<span class="pill"

						<span class="g">●</span> live</span
					>
				</div>
				<div class="content" id="content"></div>
			</div>
		</div>

								"detail": "Hermes emits explicit delegate_task tool calls, so parent\u2192child is unambiguous."
							},
							{
								"t": "2026-07-13T18:11:40Z",
								"kind": "tool.call",
								"verdict": "allow",
								"actor": "sa_fx",
								"text": "GET 1forge quotes",
								"call": "exec_mock_fx1"
							},
							{
								"t": "2026-07-13T18:14:05Z",
								"kind": "broker.pbac_denied",
								"verdict": "deny",
								"actor": "sa_eq",
								"text": "equities API blocked \u2014 no toolkit",
								"call": "exec_mock_eq1",
								"detail": "Default DENY: no toolkit serves the equities API for this agent."
							},
							{
								"t": "2026-07-13T18:22:04Z",
								"kind": "session.end",
								"verdict": "deny",
								"actor": "root",
								"text": "Brief partially assembled (equities blocked)."
							}
						],
						"session_id": "sess_mock_market01",
						"correlation": "llm-proxy \u2192 Jentic-Session-Id header \u2192 broker"
					}
				]
			}
		</script>
		<script>
			const DATA = JSON.parse(document.getElementById('data').textContent);
			const content = document.getElementById('content');
			const crumbs = document.getElementById('crumbs');
			const state = {
				level: 'agents',
				agentId: null,
				sessionId: null,
				verdict: 'all',
				search: '',
			};

			const fmtTime = (iso) =>
				new Date(iso).toLocaleTimeString([], {
					hour: '2-digit',
					minute: '2-digit',
					second: '2-digit',
				});
			const fmtDay = (iso) =>
				new Date(iso).toLocaleDateString([], { month: 'short', day: 'numeric' });
			function fmtDur(ms) {
				if (ms < 1000) return ms + 'ms';
				const s = ms / 1000;
				if (s < 60) return s.toFixed(s < 10 ? 1 : 0) + 's';
				const m = Math.floor(s / 60);
				return m + 'm ' + Math.round(s % 60) + 's';
			}
			const fmtNum = (n) => n.toLocaleString();
			const fmtTok = (n) =>
				n >= 1000 ? (n / 1000).toFixed(n >= 100000 ? 0 : 1) + 'k' : String(n);
			const esc = (s) =>
				String(s == null ? '' : s).replace(
					/[&<>]/g,
					(c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c],
				);
			const agent = (id) => DATA.agents.find((a) => a.id === id);
			const session = (id) => DATA.sessions.find((s) => s.id === id);
			const agentSessions = (id) => DATA.sessions.filter((s) => s.agent_id === id);
			function go(n) {
				Object.assign(state, n);
				render();
			}
			window.go = go;

			function render() {
				renderCrumbs();
				if (state.level === 'agents') return renderAgents();
				if (state.level === 'session') return renderSession();
				if (state.level === 'trace') return renderTrace();
			}
			function renderCrumbs() {
				const p = [];
				if (state.level === 'agents') {
					p.push('<b>Sessions</b>');
				} else {
					p.push(
						`<a onclick="go({level:'agents',agentId:null,sessionId:null})">Sessions</a>`,
					);
				}
				if (state.level === 'session') {
					const a = agent(state.agentId);
					p.push('<span class="s">/</span>', `<b>${esc(a.name)}</b>`);
				}
				if (state.level === 'trace') {
					const a = agent(state.agentId),
						s = session(state.sessionId);
					p.push(
						'<span class="s">/</span>',
						`<a onclick="go({level:'session',sessionId:null})">${esc(a.name)}</a>`,
						'<span class="s">/</span>',
						`<b>${esc(s.title)}</b>`,
					);
				}
				crumbs.innerHTML = p.join(' ');
			}

			/* LEVEL 1 */
			function renderAgents() {
				const tCalls = DATA.agents.reduce((n, a) => n + a.calls_total, 0);
				const tDeny = DATA.agents.reduce((n, a) => n + a.denies_total, 0);
				const tTok = DATA.agents.reduce((n, a) => n + a.tokens_total, 0);
				const tCost = DATA.agents.reduce((n, a) => n + a.cost_usd, 0);
				const rows = DATA.agents
					.filter((a) =>
						state.search
							? (a.name + a.id).toLowerCase().includes(state.search.toLowerCase())
							: true,
					)
					.filter((a) => (state.verdict === 'deny' ? a.denies_total > 0 : true))
					.map((a) => {
						const ok =
							a.calls_total + a.denies_total
								? Math.round(
										(a.calls_total / (a.calls_total + a.denies_total)) * 100,
									)
								: 100;
						return `<tr class="clk" onclick="go({level:'session',agentId:'${a.id}'})">
      <td><div class="aname"><span class="av">${esc(a.name.slice(0, 2).toUpperCase())}</span>
        <div>${esc(a.name)}${a.mock ? ' <span class="chip">mock</span>' : ' <span class="chip allow">captured</span>'}
        <div class="muted mono" style="font-size:11px;font-weight:400">${esc(a.id)}</div></div></div></td>
      <td class="muted">${esc(a.owner)}</td><td>${a.sessions}</td><td>${a.calls_total}</td>
      <td>${a.denies_total ? `<span class="chip deny"><span class="dot deny"></span>${a.denies_total}</span>` : '<span class="muted">0</span>'}</td>
      <td><span class="bar"><i class="${ok < 100 ? 'warn' : ''}" style="width:${ok}%"></i></span> <span class="muted mono" style="font-size:11px">${ok}%</span></td>
      <td class="mono">${fmtTok(a.tokens_total)}</td><td class="mono">$${a.cost_usd.toFixed(2)}</td>
      <td class="muted mono" style="font-size:11px">${fmtDay(a.last_seen)} ${fmtTime(a.last_seen)}</td></tr>`;
					})
					.join('');
				content.innerHTML = `
    <div class="h1">Sessions</div>
    <div class="sub">Every agent that has talked to this Jentic One instance. Pick one to see its runs, its subagent tree, and every governed tool-call.</div>
    <div class="stats">
      <div class="stat"><div class="k">Agents</div><div class="v">${DATA.agents.length}</div></div>
      <div class="stat"><div class="k">Sessions</div><div class="v">${DATA.sessions.length}</div></div>
      <div class="stat"><div class="k">Tool-calls</div><div class="v">${tCalls}</div></div>
      <div class="stat"><div class="k">Denied</div><div class="v" style="color:var(--deny)">${tDeny}</div></div>
      <div class="stat"><div class="k">Tokens</div><div class="v">${fmtTok(tTok)}</div></div>
      <div class="stat"><div class="k">Cost</div><div class="v">$${tCost.toFixed(2)}</div></div>
    </div>
    <div class="filters">
      <input class="search" placeholder="Search agents…" value="${esc(state.search)}" oninput="state.search=this.value;renderAgents()"/>
      <div class="seg"><button class="${state.verdict === 'all' ? 'on' : ''}" onclick="go({verdict:'all'})">All</button>
      <button class="${state.verdict === 'deny' ? 'on' : ''}" onclick="go({verdict:'deny'})">With denies</button></div>
    </div>
    <div class="card"><table>
      <thead><tr><th>Agent</th><th>Owner</th><th>Sessions</th><th>Calls</th><th>Denied</th><th>Allow rate</th><th>Tokens</th><th>Cost</th><th>Last seen</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="9" class="empty">No agents match.</td></tr>'}</tbody></table></div>`;
			}
			window.renderAgents = renderAgents;
		</script>
		<script>
			/* LEVEL 2: sessions + playground */
			function renderSession() {
				const a = agent(state.agentId);
				const list = agentSessions(a.id).filter((s) => {
					if (state.verdict !== 'all' && s.verdict !== state.verdict) return false;
					if (state.search && !s.title.toLowerCase().includes(state.search.toLowerCase()))
						return false;
					return true;
				});
				const active =
					state.sessionId && list.find((s) => s.id === state.sessionId)
						? session(state.sessionId)
						: list[0];
				const rows = list
					.map(
						(
							s,
						) => `<tr class="clk" onclick="selSession('${s.id}')" style="${active && s.id === active.id ? 'background:var(--panel2)' : ''}">
      <td><span class="dot ${s.verdict}"></span> ${esc(s.title)}${s.mock ? ' <span class="chip">mock</span>' : ''}
        <div class="muted mono" style="font-size:11px">${esc(s.client)} · ${esc(s.driver)}</div></td>
      <td class="muted mono" style="font-size:11px">${fmtDay(s.started_at)} ${fmtTime(s.started_at)}</td>
      <td class="mono">${fmtDur(s.duration_ms)}</td><td>${s.calls}</td>
      <td>${s.denies ? `<span class="chip deny">${s.denies}</span>` : '<span class="muted">0</span>'}</td>
      <td class="mono">${fmtTok(s.tokens_total)}</td><td class="mono">$${s.cost_usd.toFixed(2)}</td></tr>`,
					)
					.join('');
				content.innerHTML = `
    <div class="back" onclick="go({level:'agents',agentId:null,sessionId:null})">← All agents</div>
    <div class="h1"><span class="av" style="display:inline-flex;vertical-align:middle;margin-right:8px">${esc(a.name.slice(0, 2).toUpperCase())}</span>${esc(a.name)}</div>
    <div class="sub">${esc(a.owner)} · ${a.sessions} session(s) · ${a.calls_total} tool-calls · ${a.denies_total} denied · ${fmtTok(a.tokens_total)} tokens</div>
    <div class="filters">
      <input class="search" placeholder="Filter sessions…" value="${esc(state.search)}" oninput="state.search=this.value;renderSession()"/>
      <select onchange="state.verdict=this.value;renderSession()">
        <option value="all" ${state.verdict === 'all' ? 'selected' : ''}>All verdicts</option>
        <option value="allow" ${state.verdict === 'allow' ? 'selected' : ''}>Allowed</option>
        <option value="deny" ${state.verdict === 'deny' ? 'selected' : ''}>Had denies</option></select>
    </div>
    <div class="card" style="margin-bottom:18px"><table>
      <thead><tr><th>Session</th><th>Started</th><th>Duration</th><th>Calls</th><th>Denied</th><th>Tokens</th><th>Cost</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="7" class="empty">No sessions match.</td></tr>'}</tbody></table></div>
    <div id="pg"></div>`;
				if (active) renderPlayground(active);
			}
			window.renderSession = renderSession;
			function selSession(id) {
				state.sessionId = id;
				renderSession();
			}
			window.selSession = selSession;

			function renderPlayground(s) {
				const isRoot = (x) => x.parent === null || x.parent === undefined;
				const rootN = s.subagents.find(isRoot) || s.subagents[0];
				const kids = s.subagents.filter((x) => !isRoot(x));
				const node = (
					n,
					cls,
				) => `<div class="node ${cls} ${n.verdict}" onclick='openSub(${JSON.stringify(n).replace(/'/g, '&#39;')})'>
      <div class="nl"><span class="dot ${n.verdict}"></span>${esc(n.label)}</div>
      <div class="nm">${esc(n.model)}</div>
      <div class="ns"><span>${n.llm_calls} llm</span><span>${fmtTok((n.tok_in || 0) + (n.tok_out || 0))} tok</span>${n.outcome ? `<span>${esc(n.outcome)}</span>` : ''}</div></div>`;
				document.getElementById('pg').innerHTML = `
    <div class="pgwrap">
      <div class="pg">
        <div class="pgt">Subagent tree · ${kids.length ? kids.length + ' spawned' : 'no subagents'} · source: ${esc(s.source)}</div>
        <div class="tree">${node(rootN, 'root')}
          ${kids.length ? `<div class="conn"></div><div class="kids">${kids.map((k) => `<div class="kid">${node(k, '')}</div>`).join('')}</div>` : ''}
        </div></div>
      <div class="side">
        <div class="card"><h4>Session at a glance</h4>
          <div class="kv"><span class="k">Verdict</span><span class="v"><span class="chip ${s.verdict}">${s.verdict.toUpperCase()}</span></span></div>
          <div class="kv"><span class="k">Client</span><span class="v">${esc(s.client)}</span></div>
          <div class="kv"><span class="k">Driver</span><span class="v">${esc(s.driver)}</span></div>
          <div class="kv"><span class="k">Duration</span><span class="v">${fmtDur(s.duration_ms)}</span></div>
          <div class="kv"><span class="k">Tool-calls</span><span class="v">${s.calls}</span></div>
          <div class="kv"><span class="k">Denied</span><span class="v" style="color:${s.denies ? 'var(--deny)' : 'inherit'}">${s.denies}</span></div>
          <div class="kv"><span class="k">Tokens</span><span class="v">${fmtNum(s.tokens_total)}</span></div>
          <div class="kv"><span class="k">Cost</span><span class="v">$${s.cost_usd.toFixed(2)}</span></div></div>
        <div class="card"><h4>What happened</h4>
          <div class="muted" style="font-size:13px;line-height:1.55">${esc(s.summary)}</div></div>
        <button class="cta" onclick="go({level:'trace',sessionId:'${s.id}'})">Open full trace →</button>
      </div></div>`;
			}
		</script>
		<script>
			/* LEVEL 3: full trace — chat (left) + tool calls (right) + timeline drawer */
			function renderTrace() {
				const s = session(state.sessionId);
				const chat =
					(s.chat || [])
						.map((c, i) => {
							const tools = (c.tools || [])
								.map(
									(t) =>
										`<span class="tag ${t.spawn ? 'spawn' : ''}">${t.spawn ? '⑂ ' : '⚒ '}${esc(t.name)}</span>`,
								)
								.join('');
							const meta = `${fmtTime(c.t)} · ${fmtTok(c.tok_in)}→${fmtTok(c.tok_out)} tok${c.latency_ms ? ' · ' + c.latency_ms + 'ms' : ''}`;
							return `<div class="turn assistant">
      <div class="th" onclick="this.parentNode.querySelector('.tb').classList.toggle('hidden')">
        <span class="rl">assistant</span><span class="tt">${meta}</span></div>
      ${c.text ? `<div class="tb">${esc(c.text)}</div>` : '<div class="tb muted">(tool call only)</div>'}
      ${tools ? `<div class="toolrow">${tools}</div>` : ''}</div>`;
						})
						.join('') || '<div class="empty">No chat captured for this session.</div>';

				const calls =
					(s.calls_detail || [])
						.map((c, i) => {
							const v = c.verdict;
							return `<div class="tccard ${v}">
      <div class="tch" onclick="this.parentNode.querySelector('.tcbody').classList.toggle('open')">
        <span class="chip ${c.method === 'GET' ? 'get' : 'post'}">${esc(c.method)}</span>
        <span class="req">${esc(c.path)}</span>
        <span class="tt">${fmtTime(c.t)}</span></div>
      <div class="tcbody">
        <div class="metarow">
          <span class="chip ${v}">${v.toUpperCase()}</span>
          ${c.http_status ? `<span class="chip ${v}">HTTP ${c.http_status}</span>` : '<span class="chip deny">no response</span>'}
          <span class="chip">${c.duration_ms}ms</span>
          <span class="chip mono">${esc(c.api)}</span></div>
        <div class="lbl">Full request URL</div><div class="pre">${esc(c.method)} ${esc(c.url)}</div>
        <div class="lbl">Query params</div><div class="pre">${esc(JSON.stringify(c.query, null, 2))}</div>
        <div class="lbl">Request headers</div><div class="pre">${esc(JSON.stringify(c.req_headers, null, 2))}</div>
        ${c.req_body ? `<div class="lbl">Request body</div><div class="pre">${esc(c.req_body)}</div>` : ''}
        <div class="lbl">Response body${c.resp_bytes ? ` · ${c.resp_bytes} bytes` : ''}</div><div class="pre">${esc(c.resp_body)}</div>
        <div class="lbl">Governance</div><div class="pre">rule: ${esc(c.rule)}
credential: ${esc(c.cred || '—')}
toolkit: ${esc(c.toolkit || '—')}
exec_id: ${esc(c.exec_id)}${
								c.session_id
									? `
session_id: ${esc(c.session_id)}
call_id: ${esc(c.call_id || '—')}  (← caused by this model turn)
parent_call_id: ${esc(c.parent_call_id || '—')}`
									: ''
							}</div>
      </div></div>`;
						})
						.join('') || '<div class="empty">No tool calls in this session.</div>';

				const tl = (s.timeline || [])
					.map((e) => {
						const v = e.verdict || 'info';
						return `<div style="display:flex;gap:10px;padding:6px 0;cursor:pointer" onclick='openEvent(${JSON.stringify(e).replace(/'/g, '&#39;')})'>
      <span class="dot ${v}" style="margin-top:6px"></span>
      <div><span class="mono muted" style="font-size:11px">${fmtTime(e.t)}</span> <span class="chip ${v}" style="margin-left:6px">${esc(e.kind)}</span>
      <div style="font-size:13px;margin-top:2px">${esc(e.text)}</div></div></div>`;
					})
					.join('');

				content.innerHTML = `
    <div class="back" onclick="go({level:'session'})">← Back to ${esc(agent(state.agentId).name)}</div>
    <div class="h1">${esc(s.title)}${s.mock ? ' <span class="chip">mock</span>' : ' <span class="chip allow">captured</span>'}</div>
    <div class="sub">${fmtDay(s.started_at)} ${fmtTime(s.started_at)} → ${fmtTime(s.ended_at)} · ${esc(s.client)} · ${esc(s.driver)} · source: ${esc(s.source)}</div>
    ${s.session_id ? `<div class="sub" style="margin-top:-12px"><span class="chip info">session_id ${esc(s.session_id)}</span> <span class="muted" style="font-size:12px">${esc(s.correlation || '')}</span></div>` : ''}
    <div class="stats" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat"><div class="k">Verdict</div><div class="v" style="color:${s.verdict === 'deny' ? 'var(--deny)' : 'var(--allow)'}">${s.verdict.toUpperCase()}</div></div>
      <div class="stat"><div class="k">Tool-calls</div><div class="v">${s.calls} <small>· ${s.denies} denied</small></div></div>
      <div class="stat"><div class="k">Chat turns</div><div class="v">${(s.chat || []).length}</div></div>
      <div class="stat"><div class="k">Tokens</div><div class="v">${fmtTok(s.tokens_total)}</div></div>
      <div class="stat"><div class="k">Cost</div><div class="v">$${s.cost_usd.toFixed(2)}</div></div>
    </div>
    <div class="card" style="padding:14px 16px;margin-bottom:18px"><div style="font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);margin-bottom:10px">Governed timeline</div>${tl}</div>
    <div class="trace">
      <div class="col"><h4>Reasoning &amp; chat <span class="chip">${(s.chat || []).length} turns · llm-proxy</span></h4>${chat}</div>
      <div class="col"><h4>Tool calls <span class="chip">${(s.calls_detail || []).length} · broker</span></h4>${calls}</div>
    </div>`;
			}

			/* drawers */
			function drawer(html) {
				closeDrawer();
				const sc = document.createElement('div');
				sc.className = 'scrim';
				sc.onclick = closeDrawer;
				const d = document.createElement('div');
				d.className = 'drawer';
				d.innerHTML = `<span class="x" onclick="closeDrawer()">×</span>${html}`;
				document.body.appendChild(sc);
				document.body.appendChild(d);
			}
			function closeDrawer() {
				document.querySelectorAll('.drawer,.scrim').forEach((e) => e.remove());
			}
			window.closeDrawer = closeDrawer;

			function openSub(n) {
				drawer(`<h3>${esc(n.label)}</h3><div class="muted mono" style="font-size:12px">${esc(n.id)}</div>
    <div class="sect"><h5>Governance</h5>
      <div class="kv"><span class="k">Verdict</span><span class="v"><span class="chip ${n.verdict}">${(n.verdict || 'info').toUpperCase()}</span></span></div>
      <div class="kv"><span class="k">Outcome</span><span class="v">${esc(n.outcome || '—')}</span></div></div>
    <div class="sect"><h5>LLM proxy</h5>
      <div class="kv"><span class="k">Model</span><span class="v">${esc(n.model)}</span></div>
      <div class="kv"><span class="k">LLM calls</span><span class="v">${n.llm_calls}</span></div>
      <div class="kv"><span class="k">Tokens in</span><span class="v">${fmtNum(n.tok_in || 0)}</span></div>
      <div class="kv"><span class="k">Tokens out</span><span class="v">${fmtNum(n.tok_out || 0)}</span></div>
      ${n.started ? `<div class="kv"><span class="k">Window</span><span class="v">${fmtTime(n.started)}–${n.ended ? fmtTime(n.ended) : '…'}</span></div>` : ''}</div>
    ${n.task ? `<div class="sect"><h5>Task prompt (what the parent asked)</h5><div class="pre">${esc(n.task)}</div></div>` : ''}
    <div class="sect"><h5>How this node was detected</h5><div class="pre">${esc(n.detected || '—')}</div></div>`);
			}
			window.openSub = openSub;

			function openEvent(e) {
				const rows = [];
				const add = (k, v) => {
					if (v != null && v !== '')
						rows.push(
							`<div class="kv"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>`,
						);
				};
				add('When', new Date(e.t).toISOString());
				add('Kind', e.kind);
				add('Verdict', (e.verdict || 'info').toUpperCase());
				add('Actor', e.actor);
				add('Call', e.call);
				drawer(`<h3>${esc(e.text)}</h3><div class="muted mono" style="font-size:12px">${esc(e.kind)}</div>
    <div class="sect"><h5>Record</h5>${rows.join('')}</div>
    ${e.detail ? `<div class="sect"><h5>Why</h5><div class="pre">${esc(e.detail)}</div></div>` : ''}
    <div class="sect"><h5>Source</h5><div class="pre">${esc(e.call ? 'admin.execution_records (broker)' : e.kind.startsWith('subagent') ? 'LLM proxy capture (thread graph)' : 'admin.events (event stream)')}</div></div>`);
			}
			window.openEvent = openEvent;

			document.addEventListener('keydown', (e) => {
				if (e.key === 'Escape') closeDrawer();
			});
			render();
		</script>
	</body>
</html>
